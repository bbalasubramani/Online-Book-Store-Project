services:
  - type: web
    name: online-book-store-backend
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn bookstore.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: be1c9d729582384dc2fe8aa1830ff4d2fe2b7ab6c14d13fcf091d3ce71d2f534
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: bookstore.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://bookstore.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-site.netlify.app
      - key: WEB_CONCURRENCY
        value: "2"
